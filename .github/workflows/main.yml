name: 'Session Tracker - Publish'
on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Cache Whisper model
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/ggml-small.bin
          key: whisper-model-small-v1

      - name: Download Whisper model
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p src-tauri/resources
          curl -L https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin -o src-tauri/resources/ggml-small.bin

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Session Tracker v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
